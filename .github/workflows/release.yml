name: Release to npm

# Publishes a package to npm when a release tag is pushed:
#
#   sdk-v1.2.3        -> @simple-post/sdk@1.2.3   (dist-tag: latest)
#   cli-v1.2.3        -> @simple-post/cli@1.2.3   (dist-tag: latest)
#   cli-v1.2.3-beta.1 -> @simple-post/cli@1.2.3-beta.1 (dist-tag: beta)
#
# The dist-tag is derived from the prerelease identifier: a stable version is
# published as "latest", "1.2.3-beta.1" as "beta", "1.2.3-rc.0" as "rc", etc.
#
# Authentication uses npm trusted publishing (OIDC) — no token secret needed.
# Each package must be configured on npmjs.com (package Settings -> Trusted
# Publisher) with this repository and the "release.yml" workflow.

on:
  push:
    tags:
      - "sdk-v*"
      - "cli-v*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      # Trusted publishing requires npm >= 11.5.1; Node 22 bundles an older npm.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Enable Corepack
        run: corepack enable

      - name: Parse release tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          WORKSPACE="${TAG%%-v*}"
          VERSION="${TAG#*-v}"

          case "$WORKSPACE" in
            sdk|cli) ;;
            *) echo "Unknown workspace in tag: $TAG" >&2; exit 1 ;;
          esac

          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="${VERSION#*-}"
            DIST_TAG="${PRERELEASE%%.*}"
            if ! [[ "$DIST_TAG" =~ ^[a-z][a-z0-9-]*$ ]]; then
              DIST_TAG="next"
            fi
          else
            DIST_TAG="latest"
          fi

          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing @simple-post/$WORKSPACE@$VERSION with dist-tag $DIST_TAG"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./${{ steps.tag.outputs.workspace }}/package.json').version")"
          if [[ "$PKG_VERSION" != "${{ steps.tag.outputs.version }}" ]]; then
            echo "Tag version ${{ steps.tag.outputs.version }} does not match package.json version $PKG_VERSION" >&2
            echo "Bump the version in ${{ steps.tag.outputs.workspace }}/package.json before tagging." >&2
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify SDK dependency is published (CLI only)
        if: steps.tag.outputs.workspace == 'cli'
        run: |
          SDK_RANGE="$(node -p "require('./cli/package.json').dependencies['@simple-post/sdk']")"
          if ! npm view "@simple-post/sdk@$SDK_RANGE" version --registry https://registry.npmjs.org > /dev/null 2>&1; then
            echo "No published @simple-post/sdk version satisfies \"$SDK_RANGE\" on npm." >&2
            echo "Publish the SDK first by pushing an sdk-v* tag." >&2
            exit 1
          fi

      - name: Run checks
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: yarn workspace @simple-post/${{ steps.tag.outputs.workspace }} check

      - name: Run tests
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: yarn workspace @simple-post/${{ steps.tag.outputs.workspace }} test

      - name: Publish to npm
        working-directory: ${{ steps.tag.outputs.workspace }}
        run: npm publish --tag "${{ steps.tag.outputs.dist_tag }}"
